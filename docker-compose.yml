services:
  adventconnect:
    build: .
    restart: always
    ports:
      - "4000:4000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/adventconnect

  mongodb:
    image: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  frontend:
    build: ../adventconnect-frontend
    restart: always
    ports:
      - "3000:3000"

volumes:
  mongodb_data:
